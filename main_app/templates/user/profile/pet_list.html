{% extends "user_detail.html" %}
{% block profile_selected_block %}
<div id='pet_list_all'>
<h1> Owner Pets List </h1>

{% for pet in pets %}
<a href="/users/{{user.id}}/animal/{{pet.id}}/">
<div id='pet_list'>
<img src="{{pet.image}}" alt="pet image">
{% comment %} <p>your {{pet.type}} name is {{pet.animal_name}} and he is {{pet.age}} year old.</p> {% endcomment %}
<h3>{{pet.animal_name}}</h3>
</div></a>
{% endfor %}</div>
{% endblock profile_selected_block %}
